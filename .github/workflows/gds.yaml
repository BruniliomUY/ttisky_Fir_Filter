name: gds
on:
  push:
  workflow_dispatch:
jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build GDS
        uses: TinyTapeout/tt-gds-action@ttsky26c
        with:
          pdk: sky130A

  precheck:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttsky26c

  gl_test:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: GL test
        id: gl_test
        continue-on-error: true
        uses: TinyTapeout/tt-gds-action/gl_test@ttsky26c
      - name: Debug PDK contents
        if: always()
        run: |
          echo "--- locating sky130A dir (PDK_ROOT not set in this step) ---"
          find / -maxdepth 5 -iname "sky130A" -type d 2>/dev/null || true
          echo "--- io verilog files ---"
          find /home/runner/pdk/sky130A/libs.ref -path "*io*verilog*" -name "*.v" 2>/dev/null || true
          echo "--- stdcell verilog files ---"
          find /home/runner/pdk/sky130A/libs.ref -path "*sc_hd*verilog*" -name "*.v" 2>/dev/null || true
      - name: Fail job if GL test failed
        if: steps.gl_test.outcome == 'failure'
        run: exit 1

  viewer:
    needs: gds
    runs-on: ubuntu-24.04
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttsky26c