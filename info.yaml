# Tiny Tapeout project information
project:
  title:        "Fir_Filter"      # Project title
  author:       "Bruno Moreira"      # Your name
  discord:      "bruniliom"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A simple FIR filter implementation with UART communication"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module: "tt_um_bruniliomuy_top"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_bruniliomuy_top.v"
    - "filtro_fir.v"
    - "SatTruncFP.v"
    - "uart_tx.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Signal to filter[0]"
  ui[1]: "Signal to filter[1]"
  ui[2]: "Signal to filter[2]"
  ui[3]: "Signal to filter[3]"
  ui[4]: "Signal to filter[4]"
  ui[5]: "Signal to filter[5]"
  ui[6]: "Signal to filter[6]"
  ui[7]: "Signal to filter[7]"

  # Outputs
  uo[0]: "0"
  uo[1]: "0"
  uo[2]: "0"
  uo[3]: "0"
  uo[4]: "0"
  uo[5]: "0"
  uo[6]: "0"
  uo[7]: "0"

  # Bidirectional pins
  uio[0]: "tx_w"
  uio[1]: "filter_sel[0]"
  uio[2]: "filter_sel[1]"
  uio[3]: "0"
  uio[4]: "0"
  uio[5]: "0"
  uio[6]: "0"
  uio[7]: "0"

# Do not change!
yaml_version: 6
